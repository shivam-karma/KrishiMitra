<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- Hero Background Element -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-br from-primary via-primary-container to-secondary opacity-5"></div>
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-secondary-container rounded-full blur-[120px] opacity-20"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-primary-container rounded-full blur-[120px] opacity-20"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-md">
<!-- Brand Identity Section -->
<div class="text-center mb-12">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-primary to-primary-container shadow-xl mb-6">
<span class="material-symbols-outlined text-4xl text-on-primary" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tighter text-primary">Krishi</h1>
<p class="font-body text-on-surface-variant mt-2 text-sm tracking-wide">Cultivating Digital Excellence</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-3xl p-8 shadow-[0_12px_32px_rgba(0,33,23,0.06)] border border-outline-variant/10">
<!-- Role Selection Toggle -->
<div class="mb-8">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-4 ml-1">Select Your Path</label>
<div class="grid grid-cols-2 p-1.5 bg-surface-container-low rounded-full gap-1">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-full bg-secondary-container text-primary font-bold text-sm shadow-sm transition-all duration-300">
<span class="material-symbols-outlined text-lg" data-icon="agriculture">agriculture</span>
                            Farmer
                        </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-full text-on-surface-variant font-semibold text-sm hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-lg" data-icon="shopping_basket">shopping_basket</span>
                            Buyer
                        </button>
</div>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<div>
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all font-medium" id="email" placeholder="name@krishi.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2 ml-1">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-secondary hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all font-medium" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:shadow-xl hover:scale-[1.02] active:scale-95 transition-all duration-300" type="submit">
                        Login to Krishi
                    </button>
</form>
<!-- Social Login Separator -->
<div class="flex items-center my-8">
<div class="flex-grow h-px bg-surface-container"></div>
<span class="px-4 text-[10px] font-black uppercase tracking-widest text-outline">or explore with</span>
<div class="flex-grow h-px bg-surface-container"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-2xl bg-surface-container-low hover:bg-surface-container text-on-surface font-semibold text-sm transition-all">
<img alt="" class="w-5 h-5" data-alt="Google logo icon with clean flat design aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_HLtJCeDBjOT5h4KL2fm5paMj_QXPtz3wSvqV7aX5DQ6oKXdJHitCfM6xmBdq2vbggGTjiCxADgDLet3zsQDihhR7NAU-49pRHF31_oT-pWskRpNcN_wKC9qbtiKw7dlstJ979N32zO6jvfOY_SBL8dlOgF1bB0TfR_V83FH2Uep9IJF8JsYdxYK_dCX_8Imc7ztaWfUdAz6egEIO_qlMRV4zV55-gYLcYiZjYIGO_IlhCvtldw4d1Cl6x-zFENpCAnm6Yi3WDAE"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-2xl bg-surface-container-low hover:bg-surface-container text-on-surface font-semibold text-sm transition-all">
<span class="material-symbols-outlined text-xl" data-icon="fingerprint">fingerprint</span>
                        Biometric
                    </button>
</div>
</div>
<!-- Bottom Navigation -->
<div class="mt-10 text-center">
<p class="text-sm font-medium text-on-surface-variant">
                    New to the community? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1 transition-all" href="#">Create Account</a>
</p>
</div>
</div>
</main>
<!-- Footer Visual -->
<footer class="relative z-10 p-10 mt-auto overflow-hidden">
<div class="flex justify-center items-center opacity-30">
<div class="flex flex-col items-center">

<p class="text-[10px] font-bold uppercase tracking-[0.3em] text-outline">Krishi Heritage • Est 2024</p>
